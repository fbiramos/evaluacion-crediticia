<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CreditEval - Motor de Riesgo</title>
    <!-- Tailwind CSS para diseño rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-900 antialiased font-sans">

    <nav class="p-4 custom-nav flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-accent">CreditEval</h1>
        <div id="nav-actions" class="space-x-2 flex items-center">
            <button onclick="router.navigate('home')" class="text-[10px] bg-gray-700 px-2 py-1 rounded uppercase font-bold">Nueva</button>
            <button onclick="router.navigate('history')" class="text-[10px] bg-gray-700 px-2 py-1 rounded uppercase font-bold">Historial</button>
            <button onclick="router.navigate('settings')" class="p-1 rounded-full hover:bg-gray-200 transition-colors" title="Configuraciones">⚙️</button>
        </div>
    </nav>

    <main id="app-container" class="container mx-auto px-4 py-6">
        <!-- VISTA: Formulario -->
        <section id="view-home" class="view">
            <div class="max-w-md mx-auto custom-card p-6 rounded-2xl shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 text-white text-center">Evaluacion crediticia</h2>
                <div class="space-y-4">
                    <div class="flex gap-4">
                        <div class="flex-[3]">
                            <label class="block text-xs text-muted mb-1 uppercase tracking-wider">Cliente</label>
                            <input type="text" id="client-name" placeholder="Nombre completo" class="w-full custom-input rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs text-muted mb-1 uppercase tracking-wider">Edad</label>
                            <input type="number" id="client-age" placeholder="25" class="w-full custom-input rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none text-center">
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs text-muted mb-1 uppercase tracking-wider">Puntaje</label>
                            <input type="number" id="client-score" value="5" min="1" max="10" class="w-full custom-input rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none text-center text-xl font-bold">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs text-muted mb-1 uppercase tracking-wider">Umbral</label>
                            <input type="number" id="threshold" value="7" min="1" max="10" class="w-full custom-input rounded-lg p-3 text-accent focus:ring-2 focus:ring-blue-500 outline-none text-center text-xl font-bold">
                        </div>
                    </div>
                    <button id="btn-evaluate" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 mt-4">
                        EJECUTAR EVALUACIÓN
                    </button>
                </div>

                <!-- Contenedor para el resultado inmediato -->
                <div id="result-display" class="mt-6 hidden transition-all duration-300">
                </div>
            </div>
        </section>

        <!-- VISTA: Configuraciones -->
        <section id="view-settings" class="view hidden">
            <div class="max-w-md mx-auto custom-card p-6 rounded-2xl shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 text-center">Configuraciones</h2>
                
                <div class="space-y-6">
                    <div class="flex items-center justify-between p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                        <span class="font-medium">Modo Oscuro</span>
                        <button onclick="themeManager.toggle()" id="theme-toggle-btn" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm">Cambiar</button>
                    </div>

                    <div class="pt-4 border-t border-gray-200">
                        <p class="text-[10px] text-muted uppercase font-bold mb-2 tracking-widest">Información de App</p>
                        <p class="text-sm">Versión: <span id="app-version">v24.0.0</span></p>
                        <p class="text-sm">Estado: <span class="text-green-500 font-bold">Online</span></p>
                        <p class="text-xs text-muted mt-4 text-center">© 2024 CreditEval Professional System</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- VISTA: Historial -->
        <section id="view-history" class="view hidden">
            <h2 class="text-2xl font-semibold mb-4 text-center">Registro de Evaluaciones</h2>
            <div id="history-list" class="space-y-3 max-w-lg mx-auto">
                <p class="text-gray-500 text-center italic">No hay registros aún...</p>
            </div>
        </section>
    </main>

    <!-- Firebase Core y Firestore (Versión Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Cargamos la lógica al final -->
    <script src="app.js"></script>
    <script>
        // Registro del Service Worker para actualizaciones
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registrado con éxito');
                });
            });
        }
    </script>
</body>
</html>
